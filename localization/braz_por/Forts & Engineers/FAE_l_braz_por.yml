    FAE_txt_ai_strong_warning: "#red $fae_building_forts$ podem ter dificuldade em fornecer assistência útil contra ofensivas da IA.#!"
    
    setting_FAE_grs_ai_siege_nil:      "Nenhum"
    setting_FAE_grs_ai_siege_nil_desc: "Países IA não recebem bônus ao seu [concept_FAE_siege]. $FAE_txt_ai_weak_warning$"
    setting_FAE_grs_ai_siege_low:      "[GetPlayer.MakeScope.ScriptValue('FAE_ai_mult_low')|=0%]"
    setting_FAE_grs_ai_siege_low_desc: "Países IA ganharão [GetPlayer.MakeScope.ScriptValue('FAE_ai_mult_low')|v=0%] de [concept_FAE_siege] extra em cada batalha."
    setting_FAE_grs_ai_siege_med:      "[GetPlayer.MakeScope.ScriptValue('FAE_ai_mult_med')|=0%]"
    setting_FAE_grs_ai_siege_med_desc: "Países IA ganharão [GetPlayer.MakeScope.ScriptValue('FAE_ai_mult_med')|v=0%] de [concept_FAE_siege] extra em cada batalha."
    setting_FAE_grs_ai_siege_hi:       "[GetPlayer.MakeScope.ScriptValue('FAE_ai_mult_hi')|=0%]"
    setting_FAE_grs_ai_siege_hi_desc:  "Países IA ganharão [GetPlayer.MakeScope.ScriptValue('FAE_ai_mult_hi')|v=0%] de [concept_FAE_siege] extra em cada batalha."
    setting_FAE_grs_ai_siege_vhi:      "[GetPlayer.MakeScope.ScriptValue('FAE_ai_mult_vhi')|=0%]"
    setting_FAE_grs_ai_siege_vhi_desc: "Países IA ganharão [GetPlayer.MakeScope.ScriptValue('FAE_ai_mult_vhi')|v=0%] de [concept_FAE_siege] extra em cada batalha. $FAE_txt_ai_strong_warning$"
    setting_FAE_grs_ai_siege_ext:      "[GetPlayer.MakeScope.ScriptValue('FAE_ai_mult_ext')|=0%]"
    setting_FAE_grs_ai_siege_ext_desc: "Países IA ganharão [GetPlayer.MakeScope.ScriptValue('FAE_ai_mult_ext')|v=0%] de [concept_FAE_siege] extra em cada batalha. $FAE_txt_ai_strong_warning$"
    
    # Concepts
    concept_FAE_siege:        "Capacidade de Cerco"
    concept_FAE_entrenchment: "Entrincheiramento de Fortes"
    FAE_txt_added_by_FAE:     "#italic Este é um recurso do mod #blue Fortes & Engenheiros#!.#!"
    
    FAE_txt_siege:    "[concept_FAE_siege]"
    FAE_txt_entrench: "[concept_FAE_entrenchment]"
    FAE_txt_forts:    "[GetBuildingType('fae_building_forts').GetName]"
    
    FAE_txt_battles: "No início de cada [concept_battle] ocorrendo em um [concept_state] com uma [concept_building] $FAE_txt_forts$, o $FAE_txt_siege$ e $FAE_txt_entrench$ totais são calculados a partir do número de [Concept('concept_unit', '$concept_units$')] na batalha nos lados atacante e defensor, respectivamente."
    
    FAE_txt_siege_stats:   "$FAE_txt_siege_stats_h$\n#indent_newline:6 $FAE_txt_siege_stats_1$#!\n#indent_newline:6 $FAE_txt_siege_stats_2$#!\n#indent_newline:6 $FAE_txt_siege_stats_3$#!\n#indent_newline:6 $FAE_txt_siege_stats_4$#!\n#indent_newline:6 $FAE_txt_siege_stats_5$#!\n#indent_newline:6 $FAE_txt_siege_stats_6$#!\n#indent_newline:6 $FAE_txt_siege_stats_7$#!"
    FAE_txt_siege_stats_h: "O $FAE_txt_siege$ por [Concept('concept_unit', 'unidade')] é calculado a partir de:"
    FAE_txt_siege_stats_1: "#p +[GetPlayer.MakeScope.ScriptValue('FAE_siege_combat_engies')]#! se sua [concept_military_formation] tiver a [concept_mobilization_option] [GetMobilizationOption('FAE_mo_combat_engineers').GetName] ativa (Aumenta para #p +[Add_CFixedPoint(GetPlayer.MakeScope.ScriptValue('FAE_siege_combat_engies'),GetPlayer.MakeScope.ScriptValue('FAE_siege_combat_engies_tnt'))]#! após pesquisar [GetTechnology('dynamite').GetName])"
    FAE_txt_siege_stats_2: "#p +[GetPlayer.MakeScope.ScriptValue('FAE_siege_heavy_tank')]#! se for uma [Concept('concept_combat_unit_type', 'Unidade')] de [GetCombatUnitType('combat_unit_type_heavy_tank').GetName]"
    FAE_txt_siege_stats_3: "#p +[GetPlayer.MakeScope.ScriptValue('FAE_siege_light_tank')]#! se for uma [Concept('concept_combat_unit_type', 'Unidade')] de [GetCombatUnitType('combat_unit_type_light_tanks').GetName]"
    FAE_txt_siege_stats_4: "#p +[GetPlayer.MakeScope.ScriptValue('FAE_siege_siege_arty')]#! se for uma [Concept('concept_combat_unit_type', 'Unidade')] de [GetCombatUnitType('combat_unit_type_siege_artillery').GetName]"
    FAE_txt_siege_stats_5: "#p +[GetPlayer.MakeScope.ScriptValue('FAE_siege_shrapnel_arty')]#! se for uma [Concept('concept_combat_unit_type', 'Unidade')] de [GetCombatUnitType('combat_unit_type_shrapnel_artillery').GetName]"
    FAE_txt_siege_stats_6: "#p +[GetPlayer.MakeScope.ScriptValue('FAE_siege_mobile_arty')]#! se for uma [Concept('concept_combat_unit_type', 'Unidade')] de [GetCombatUnitType('combat_unit_type_mobile_artillery').GetName]"
    FAE_txt_siege_stats_7: "#p +[GetPlayer.MakeScope.ScriptValue('FAE_siege_cannon_arty')]#! se for uma [Concept('concept_combat_unit_type', 'Unidade')] de [GetCombatUnitType('combat_unit_type_cannon_artillery').GetName]"
    
    FAE_txt_min_fort_bonus: "#p [Multiply_CFixedPoint( GetPlayer.MakeScope.ScriptValue('FAE_WEAK_FORT_MIN_BONUS'), '(CFixedPoint)100' )]%#!"
    
    concept_FAE_siege_desc: "$FAE_txt_siege$ contraria diretamente [concept_FAE_entrenchment].\n\n$FAE_txt_battles$\n\n$FAE_txt_siege$ age como uma redução direta de $FAE_txt_entrench$ em uma base de 1-para-1, e quanto mais $FAE_txt_entrench$ for reduzido, menores serão os bônus do defensor para [concept_defense] & [concept_kill_rate] e o malus do atacante para [Concept('concept_occupation', '$concept_battle$ $concept_occupation$')].\n\n$FAE_txt_siege_stats$\n\n$FAE_txt_added_by_FAE$"
    
    concept_FAE_entrenchment_desc: "$FAE_txt_entrench$ mede a eficácia de $FAE_txt_forts$ sendo utilizados por [Concept('concept_unit', 'Unidades')] defensoras.\n\n$FAE_txt_battles$\n\n$FAE_txt_entrench$ total para uma [concept_battle] é determinado tomando a produção total de $FAE_txt_entrench$ da [concept_building] $FAE_txt_forts$ envolvida na [concept_battle] e multiplicando pelo número total de [Concept('concept_unit', 'Unidades')] defensoras participando da [concept_battle]. Após calcular ambos os valores, o $FAE_txt_siege$ do atacante é subtraído do $FAE_txt_entrench$ do defensor. Este valor é dividido pelo valor original de $FAE_txt_entrench$ para determinar uma fração representando a #v eficácia#! de $FAE_txt_forts$ nesta [concept_battle]. Portanto, conforme $FAE_txt_siege$ aumenta, $FAE_txt_forts$ se tornam menos eficazes.\n\nEficácia reduzida de $FAE_txt_forts$ reduzirá os bônus do defensor para [concept_defense] & [concept_kill_rate] e o malus do atacante para [Concept('concept_occupation', '$concept_battle$ $concept_occupation$')] por uma certa porcentagem baseada na fração calculada acima. Independentemente de quão baixa esta fração seja, $FAE_txt_forts$ têm garantia de serem pelo menos $FAE_txt_min_fort_bonus$ eficazes.\n\n$FAE_txt_added_by_FAE$"