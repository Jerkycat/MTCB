l_braz_por:
 usfp_ig_trait_king_cotton: "Rei Algodão"
 usfp_ig_trait_king_cotton_desc: "O Norte depende de nosso algodão para manter suas tecelagens funcionando. Se ousarem ameaçar nosso modo de vida, cortaremos seu suprimento e os deixaremos na miséria."
 usfp_ig_trait_postmillennialism: "Pós-Milenarismo"
 usfp_ig_trait_postmillennialism_desc: "Devemos purificar nossa sociedade e promulgar uma era dourada de retidão, para trazer o retorno de Cristo."
 usfp_ig_trait_peculiar_institution: "Nossa Instituição Peculiar"
 usfp_ig_trait_peculiar_institution_desc: "O sistema de plantações único do Sul requer supervisores meticulosos. Contanto que o Norte não se meta conosco, podemos manter o algodão fluindo."
 usfp_ig_trait_go_west: "Vá para o Oeste, Jovem"
 usfp_ig_trait_go_west_desc: "A Europa e as cidades do Leste estão lotadas e cheias de decadência. Para as massas oprimidas buscando uma vida melhor, o que poderia ser mais atraente que as terras sem limites da América?"
 usfp_ig_trait_american_exceptionalism: "Excepcionalismo Americano"
 usfp_ig_trait_american_exceptionalism_desc: "Os Estados Unidos ocupam um lugar singularmente central no palco mundial. É natural que nossa cultura e nossa política moldem a própria história."
 usfp_ig_trait_democratic_experiment: "O Experimento Democrático"
 usfp_ig_trait_democratic_experiment_desc: "A democracia americana se ergue como um farol brilhante da nova era política. Nos esforçamos todos os dias para alcançar uma união mais perfeita, e cumprir os elevados objetivos de nossos pais fundadores: vida, liberdade e busca da felicidade!"
 usfp_ig_trait_revivalism: "Revivalismo"
 usfp_ig_trait_revivalism_desc: "Em reuniões de acampamento por todo o país, o povo está redespertando para seus eus espirituais. Unidos por nossa fé energizada, avançaremos juntos."
 usfp_ig_trait_republican_virtue: "Virtude Republicana"
 usfp_ig_trait_republican_virtue_desc: "O povo rural é a base da república americana. Através de nossa participação vigorosa na política local, toda a nação é elevada."
 usfp_ig_trait_caricature: "Caricatura"
 usfp_ig_trait_caricature_desc: "Uma imagem vale mais que mil palavras, e as nossas são direcionadas diretamente à atual administração."
 usfp_ig_trait_direct_action: "Ação Direta"
 usfp_ig_trait_direct_action_desc: "Procedimentos políticos são uma obstrução à causa do trabalhador. A classe dominante esqueceu que nós fazemos a economia funcionar, e sabemos como quebrá-la!"
 usfp_ig_trait_rail_tycoons: "Magnatas Ferroviários"
 usfp_ig_trait_rail_tycoons_desc: "As vastas terras da América anseiam por ser civilizadas através de ferrovias. Com formuladores de políticas cooperativos, podemos conectar o continente inteiro, e enriquecer fazendo isso."
 usfp_ig_trait_scientific_management: "Gestão Científica"
 usfp_ig_trait_scientific_management_desc: "A nova ciência da gestão mantém as fábricas da nação operando em eficiência máxima, com nossa supervisão meticulosa, é claro."
 usfp_ig_trait_gunboat_diplomacy: "Diplomacia da Canhoneira"
 usfp_ig_trait_gunboat_diplomacy_desc: "Fale mansamente e carregue um grande porrete. Nosso exército brilhante cria uma poderosa declaração diplomática sem precisar disparar um único projétil."
 usfp_ig_trait_free_silver: "Prata Livre"
 usfp_ig_trait_free_silver_desc: "Interesses financeiros das grandes cidades estão direcionando a política governamental para o empobrecimento do homem comum. Não imploraremos mais por migalhas, nossas vozes serão ouvidas!"
 usfp_ig_trait_lawmen: "Homens da Lei"
 usfp_ig_trait_lawmen_desc: "O vasto interior americano apresenta um obstáculo para a aplicação da lei. Nosso conhecimento local e xerifes leais podem dar uma mão à causa da justiça."
 usfp_ig_trait_lost_cause: "Causa Perdida"
 usfp_ig_trait_lost_cause_desc: "A Confederação foi um movimento justo pela justiça e direitos dos estados, e carregamos sua herança. O Sul se erguerá novamente!"