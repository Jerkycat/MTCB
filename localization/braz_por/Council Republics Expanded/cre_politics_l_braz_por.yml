l_braz_por:

 ig_managers: "Gerentes"
 ig_managers_desc: "Gerentes profissionais e comerciantes engajados em supervisionar as atividades diárias do local de trabalho."
 ig_nomenklatura: "Nomenklatura"
 ig_nomenklatura_desc: "Acadêmicos educados e burocratas que abraçaram uma nova posição nos escalões superiores do aparato estatal."
 ig_workers_councils: "Conselhos de Trabalhadores"
 ig_workers_councils_desc: "Conselhos capacitados de trabalhadores representando os interesses da força de trabalho."
 ig_black_army: "Exército Negro"
 ig_black_army_desc: "Conselhos de soldados que abraçaram a revolução libertária e são dedicados a defendê-la."

 ideology_cre_managerial: "Profissional-Gerencial"
 ideology_cre_managerial_desc: "#lore Este grupo apoia sistemas institucionais que capacitam gerentes a exercer controle sobre seus locais de trabalho.#!"
 ideology_cre_managerial_cooperative: "Gerencial Eletivo"
 ideology_cre_managerial_cooperative_desc: "#lore Este grupo apoia locais de trabalho estruturados democraticamente que elevam o status da gerência entre seus pares.#!"
 ideology_cre_bureaucratic: "Burocrático"
 ideology_cre_bureaucratic_desc: "#lore Este grupo apoia instituições poderosas que permitem controle burocrático racional sobre a sociedade.#!"
 ideology_cre_black_army: "Anarquista Militante"
 ideology_cre_black_army_desc: "#lore Este grupo apoia a construção de uma sociedade sem estado e uma força militar capaz de defendê-la.#!"

 ideology_reactionary_segregationist: "Segregacionista"
 ideology_reactionary_segregationist_desc: "#lore Este grupo considera outras raças como tipos distintos e inferiores de humanos não merecedores de cidadania igual.#!"
 ideology_reactionary_exclusionist: "Exclusionário"
 ideology_reactionary_exclusionist_desc: "#lore Este grupo é desconfiado de costumes estrangeiros e prefere defender a cultura nacional predominante.#!"
 ideology_reactionary_supremacist: "Supremacista"
 ideology_reactionary_supremacist_desc: "#lore Este grupo considera pessoas de sua própria herança particular como naturalmente superiores e merecedoras de uma posição dominante na sociedade.#!"

 cre_hold_company_election: "Realizar Eleição Cooperativa"
 cre_hold_company_election_info: "Substituir [Character.GetFullName] por um [concept_executive] recém-eleito."
 cre_dismiss_executive: "Demitir Executivo"
 cre_dismiss_executive_info: "Substituir [Character.GetFullName] por um [concept_executive] recém-nomeado."

 cre_amendment_women_soldiers: "Mulheres nas Forças Armadas"
 cre_amendment_women_soldiers_desc: "Mulheres são elegíveis para serviço militar, incluindo papéis na linha de frente."
 cre_amendment_elected_officers: "Oficiais Eleitos"
 cre_amendment_elected_officers_desc: "Comitês de soldados elegem seus próprios oficiais que estão sujeitos a destituição."
 cre_amendment_anarchy_secured: "Ajuda Mútua"
 cre_amendment_anarchy_secured_desc: "Trocas voluntárias e colaborativas tornaram-se predominantes nas comunidades, promovendo solidariedade e legitimando o sistema anarquista."
 cre_amendment_democratic_centralism: "Centralismo Democrático"
 cre_amendment_democratic_centralism_desc: "Facções políticas internas são banidas e decisões partidárias são mantidas unanimemente."
 cre_amendment_socialist_institutions: "Instituições Socialistas"
 cre_amendment_socialist_institutions_desc: "Programas governamentais estão totalmente alinhados com a construção de uma sociedade comunista."
 cre_amendment_centralized_planning: "Planejamento Central"
 cre_amendment_centralized_planning_desc: "Toda atividade econômica é planejada a partir de um ministério do governo central que calcula as entradas e saídas necessárias de acordo com objetivos políticos."
 cre_amendment_democratic_planning: "Planejamento Democrático"
 cre_amendment_democratic_planning_desc: "Planos econômicos são desenvolvidos e negociados por representantes dos vários setores de produção."
 cre_amendment_market_socialism: "Socialismo de Mercado"
 cre_amendment_market_socialism_desc: "Cooperativas de trabalhadores se engajam em um mercado competitivo para permitir que forças de oferta e demanda estabeleçam preços e direcionem a produção."
 cre_amendment_cybersyn: "Interconexão Cibernética"
 cre_amendment_cybersyn_desc: "Um sistema de telecomunicações de ponta transmite dados industriais de e para uma sala de operações central em [GetPlayer.GetCapital.GetCityHubName], permitindo tomada de decisões em tempo real em escala nacional."
 cre_amendment_anarchist_defense_council: "Conselho Comunal de Defesa"
 cre_amendment_anarchist_defense_council_desc: "Comunas delegam política externa e coordenação militar a um conselho federal."

 law_cre_proletarian_internationalism: "Internacionalismo Proletário"
 law_cre_proletarian_internationalism_desc: "Distinções nacionais são intencionalmente suprimidas em favor de uma ideologia de solidariedade de classe universal. Trabalhadores do mundo, uni-vos!"
 EFFECTS_ON_ACCEPTANCE_law_cre_proletarian_internationalism: "#tooltippable #tooltip:$BREAKDOWN_TAG$ Quase todos os pops são totalmente aceitos, e aqueles que não são não enfrentam penalidades.#!#!"