 intelligentsia_not_socialist: "A [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetName] #bold não#! tem um [concept_leader] #tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_ideologies_list_tt Socialista#!"
 armed_forces_not_socialist: "A [GetInterestGroupVariant('ig_armed_forces',GetPlayer).GetName] #bold não#! tem um [concept_leader] #tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_ideologies_list_tt Socialista#!"