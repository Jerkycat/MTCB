l_braz_por:

 council_republic_secured: "Completou o [concept_journal_entry] #Bold Revolução Popular#!"

 je_group_cre_socialism: "Socialismo"

 je_cre_red_intelligentsia: "Materialismo Histórico"
 je_cre_red_intelligentsia_reason: "O advento de nossa [GetLawType('law_council_republic').GetName] anuncia uma nova era na progressão da história. No passado, a [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant] esteve na vanguarda do pensamento político, mas agora é sua vez de se adaptar à nova realidade. Dado tempo e os incentivos certos, a nova geração de [GetPopType('academics').GetName] será [GetIdeology('ideology_socialist').GetName]."

 cre_red_intelligentsia_bar: "Teórica"
 cre_red_intelligentsia_bar_desc: "Progresso: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/60)"
 intelligentsia_approval: "[concept_approval] da [GetInterestGroupVariant('ig_intelligentsia',GetPlayer).GetNameWithCountryVariant]"
